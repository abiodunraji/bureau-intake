<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 108" width="200" height="108">

  <!-- Icon: green rounded square -->
  <rect x="75" y="4" width="50" height="50" rx="11" fill="#2ECC71"/>

  <!-- Map pin: smooth teardrop using proper tangent-aligned cubics -->
  <path d="M100,51 C87,42 85,34 87,27 A13,13 0 0,0 113,27 C115,34 113,42 100,51 Z" fill="white"/>
  <!-- Inner hole -->
  <circle cx="100" cy="22" r="5" fill="#2ECC71"/>

  <!-- Text: Bureau (white) + Intake (green italic) on one line -->
  <text y="83" text-anchor="middle"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="30" font-weight="700" letter-spacing="-0.4">
    <tspan x="100" fill="white">Bureau</tspan><tspan
      fill="#2ECC71"
      font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
      font-style="italic"> Intake</tspan>
  </text>

</svg>
