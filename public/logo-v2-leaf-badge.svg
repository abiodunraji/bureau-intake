<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 108" width="200" height="108">

  <!--
    Variant 2: Leaf-shaped badge
    Oval/leaf container (pointed top and bottom) with a location dot and midrib
  -->

  <!-- Leaf container: elongated oval, pointed at top and bottom -->
  <path d="M100,4 C116,4 122,15 122,30 C122,45 116,56 100,57 C84,56 78,45 78,30 C78,15 84,4 100,4 Z" fill="#2ECC71"/>

  <!-- Midrib vein (centre line) -->
  <line x1="100" y1="53" x2="100" y2="8" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Location dot -->
  <circle cx="100" cy="28" r="8" fill="white"/>

  <!-- Text -->
  <text y="84" text-anchor="middle"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="30" font-weight="700" letter-spacing="-0.4">
    <tspan x="100" fill="#1a1a2e">Bureau</tspan><tspan
      fill="#2ECC71"
      font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
      font-style="italic"> Intake</tspan>
  </text>

</svg>
