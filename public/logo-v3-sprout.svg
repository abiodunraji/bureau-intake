<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 108" width="200" height="108">

  <!--
    Variant 3: Seedling / sprout
    Two organic leaves growing from a central stem, inside a subtle ring
    Metaphor: patient growth, fresh start, recovery
  -->

  <!-- Subtle ring background -->
  <circle cx="100" cy="30" r="26" fill="rgba(46,204,113,0.07)" stroke="#2ECC71" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Left leaf: grows from stem at y≈40, curves up-left -->
  <path d="M100,41 C92,37 83,28 87,20 C93,24 100,34 100,41 Z" fill="#2ECC71"/>

  <!-- Right leaf: grows from stem at y≈32, curves up-right (slightly darker) -->
  <path d="M100,32 C108,28 117,20 113,12 C107,16 100,26 100,32 Z" fill="#27AE60"/>

  <!-- Stem -->
  <line x1="100" y1="52" x2="100" y2="20" stroke="#2ECC71" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Root dot at base of stem -->
  <circle cx="100" cy="52" r="2.5" fill="#2ECC71"/>

  <!-- Text -->
  <text y="84" text-anchor="middle"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="30" font-weight="700" letter-spacing="-0.4">
    <tspan x="100" fill="#1a1a2e">Bureau</tspan><tspan
      fill="#2ECC71"
      font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
      font-style="italic"> Intake</tspan>
  </text>

</svg>
