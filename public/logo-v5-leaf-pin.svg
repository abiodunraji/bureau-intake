<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 108" width="200" height="108">

  <!--
    Variant 5: Leaf-pin hybrid  ★ RECOMMENDED
    Map pin teardrop silhouette, but the inner cutout is a small leaf
    instead of a plain circle — merges location + nature in one mark
  -->

  <!-- Pin teardrop body -->
  <path d="M100,55 C88,48 83,37 83,25 A17,17 0 0,0 117,25 C117,37 112,48 100,55 Z" fill="#2ECC71"/>

  <!-- Inner leaf cutout (white, pointing upward inside the pin head) -->
  <path d="M100,31 C95,27 94,18 98,13 C104,18 105,27 100,31 Z" fill="white"/>

  <!-- Tiny leaf midrib for detail -->
  <line x1="100" y1="30" x2="100" y2="14" stroke="rgba(46,204,113,0.35)" stroke-width="1" stroke-linecap="round"/>

  <!-- Text -->
  <text y="84" text-anchor="middle"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="30" font-weight="700" letter-spacing="-0.4">
    <tspan x="100" fill="#1a1a2e">Bureau</tspan><tspan
      fill="#2ECC71"
      font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
      font-style="italic"> Intake</tspan>
  </text>

</svg>
