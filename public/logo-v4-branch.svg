<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 108" width="200" height="108">

  <!--
    Variant 4: Minimal branch / twig
    Three leaf teardrops at branch tips — no background
    Most hand-crafted, editorial feel
  -->

  <!-- Stem + branches -->
  <path d="M100,55 L100,24" stroke="#2ECC71" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M100,42 Q91,34 84,28" stroke="#2ECC71" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M100,32 Q109,24 116,18" stroke="#27AE60" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Left leaf at branch tip (~84, 28) — pointing upper-left -->
  <path d="M84,32 C78,28 76,19 80,14 C86,18 87,27 84,32 Z" fill="#2ECC71"/>

  <!-- Right leaf at branch tip (~116, 18) — pointing upper-right -->
  <path d="M116,22 C122,18 124,9 120,4 C114,8 113,17 116,22 Z" fill="#27AE60"/>

  <!-- Top leaf at stem tip (100, 24) — pointing straight up -->
  <path d="M100,26 C93,22 92,13 96,8 C102,12 103,21 100,26 Z" fill="#2ECC71"/>

  <!-- Text -->
  <text y="84" text-anchor="middle"
    font-family="'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="30" font-weight="700" letter-spacing="-0.4">
    <tspan x="100" fill="#1a1a2e">Bureau</tspan><tspan
      fill="#2ECC71"
      font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
      font-style="italic"> Intake</tspan>
  </text>

</svg>
